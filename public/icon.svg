<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Metallic Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050d1a" />
      <stop offset="50%" stop-color="#0a182d" />
      <stop offset="100%" stop-color="#020710" />
    </linearGradient>

    <!-- Metallic Blue Neon Glow -->
    <linearGradient id="metal-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e40af" />
    </linearGradient>

    <!-- Cyber Cyan Accent -->
    <linearGradient id="cyber-cyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>

    <!-- Subtle Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Squircle Frame (ตามหลัก iOS/Android Icon) -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="6" />

  <!-- Inner Ambient Blue Backlight Glow -->
  <circle cx="256" cy="256" r="160" fill="#3b82f6" opacity="0.12" filter="url(#glow)" />

  <!-- Stylized Cyber 'W' + Code Brackets Symbol -->
  <g filter="url(#glow)">
    <!-- Left Bracket < -->
    <path d="M 160 180 L 100 256 L 160 332" fill="none" stroke="url(#cyber-cyan)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Right Bracket > -->
    <path d="M 352 180 L 412 256 L 352 332" fill="none" stroke="url(#cyber-cyan)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Inner Metallic Blue 'W' (Developer identity) -->
    <path d="M 180 200 L 220 320 L 256 240 L 292 320 L 332 200" fill="none" stroke="url(#metal-blue)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Center Core Neon Dot -->
  <circle cx="256" cy="240" r="12" fill="#38bdf8" />
</svg>
